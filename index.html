<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiết Kế Tên 3D Vector</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') center/cover; }
        .card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; margin-bottom: 20px; padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #667eea; }
        #preview { background: rgba(255,255,255,0.8); border: 2px dashed #667eea; padding: 20px; border-radius: 10px; font-size: 40px; font-family: 'Montserrat', sans-serif; font-weight: 700; min-height: 60px; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; overflow: hidden; white-space: nowrap; }
        button { width: 100%; background: #667eea; color: white; border: none; padding: 15px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #5a6fe0; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="card">
    <h2>✨ Tạo Tên 3D Vector</h2>
    <input type="text" id="nameInput" placeholder="Nhập tên của bạn..." autocomplete="off">
    <div id="preview">Tên Của Bạn</div>
    <button id="downloadBtn" disabled>Đang tải dữ liệu Font...</button>
</div>

<script>
    const nameInput = document.getElementById('nameInput');
    const preview = document.getElementById('preview');
    const downloadBtn = document.getElementById('downloadBtn');
    
    let vectorFont = null;

    // Tải sẵn lõi font Montserrat Bold định dạng TTF để bẻ path
    opentype.load('https://cdn.jsdelivr.net/gh/googlefonts/montserrat@main/fonts/ttf/Montserrat-Bold.ttf', function(err, font) {
        if (err) {
            alert('Lỗi tải font vector: ' + err);
        } else {
            vectorFont = font;
            downloadBtn.textContent = "Tải File 3D (.svg)";
            downloadBtn.disabled = false;
        }
    });

    nameInput.addEventListener('input', () => {
        preview.textContent = nameInput.value.trim() || 'Tên Của Bạn';
    });

    downloadBtn.addEventListener('click', () => {
        const text = nameInput.value.trim();
        if (!text) { alert('Vui lòng nhập tên!'); return; }
        if (!vectorFont) return;

        // Bẻ khóa Text thành Path hình học
        const path = vectorFont.getPath(text, 0, 100, 100); 
        const boundingBox = path.getBoundingBox();
        const pathData = path.toPathData();

        // Tự động cắt khung SVG vừa khít với viền chữ
        const width = boundingBox.x2 - boundingBox.x1;
        const height = boundingBox.y2 - boundingBox.y1;
        const viewBox = `${boundingBox.x1} ${boundingBox.y1} ${width} ${height}`;

        // Xuất file SVG chỉ chứa thẻ <path> (đường viền), không chứa thẻ <text>
        const svgContent = `<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="${viewBox}">
    <path d="${pathData}" fill="black" />
</svg>`;

        const blob = new Blob([svgContent], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `Vector_${text.replace(/\s+/g, '_')}.svg`;
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    });
</script>

</body>
</html>
