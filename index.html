<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo SVG Tên Khách Hàng</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input, select, button { width: 100%; margin-bottom: 15px; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        #preview { border: 2px dashed #ddd; padding: 20px; border-radius: 6px; font-size: 40px; min-height: 60px; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; overflow: hidden; white-space: nowrap; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="card">
    <h2>Thiết Kế Tên 3D</h2>
    
    <input type="text" id="nameInput" placeholder="Nhập tên của bạn..." autocomplete="off">
    
    <select id="fontSelect">
        <option value="Arial">Arial</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Courier New">Courier New</option>
        <option value="Impact">Impact</option>
        <option value="Comic Sans MS">Comic Sans MS</option>
    </select>

    <div id="preview">Tên Của Bạn</div>

    <button id="downloadBtn">Xác Nhận & Tải File 3D (.svg)</button>
</div>

<script>
    const nameInput = document.getElementById('nameInput');
    const fontSelect = document.getElementById('fontSelect');
    const preview = document.getElementById('preview');
    const downloadBtn = document.getElementById('downloadBtn');

    // Cập nhật Preview khi nhập chữ hoặc đổi font
    function updatePreview() {
        const text = nameInput.value.trim() || 'Tên Của Bạn';
        preview.textContent = text;
        preview.style.fontFamily = fontSelect.value;
    }

    nameInput.addEventListener('input', updatePreview);
    fontSelect.addEventListener('change', updatePreview);

    // Xử lý tạo và tải file SVG
    downloadBtn.addEventListener('click', () => {
        const text = nameInput.value.trim();
        if (!text) {
            alert('Vui lòng nhập tên trước khi tải!');
            return;
        }

        const font = fontSelect.value;
        
        // Tạo chuỗi mã SVG chứa text
        const svgContent = `<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
    <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="${font}" font-size="100" fill="black">${text}</text>
</svg>`;

        // Chuyển chuỗi thành file và kích hoạt tải về
        const blob = new Blob([svgContent], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `Ten_${text.replace(/\s+/g, '_')}.svg`;
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    });
</script>

</body>
</html>
